{% extends "base.html" %}

{% block content %}
<h1>{{ page_title|default:"新建物料" }}</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'masterdata:material_list' %}">返回列表</a>
</div>

<section class="panel">
  <h2>物料信息</h2>
  <form class="record-form" method="post">
    {% csrf_token %}
    <div class="record-grid">
      <label class="record-field">{{ form.material_code.label }}
        {{ form.material_code }}
        {% if form.material_code.errors %}<span class="error">{{ form.material_code.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field name">{{ form.material_name.label }}
        {{ form.material_name }}
        {% if form.material_name.errors %}<span class="error">{{ form.material_name.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field short">{{ form.status.label }}
        {{ form.status }}
        {% if form.status.errors %}<span class="error">{{ form.status.errors|join:", " }}</span>{% endif %}
      </label>

      <label class="record-field medium">{{ form.material_type.label }}
        {{ form.material_type }}
        {% if form.material_type.help_text %}<span class="muted">{{ form.material_type.help_text }}</span>{% endif %}
        {% if form.material_type.errors %}<span class="error">{{ form.material_type.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field wide">{{ form.spec.label }}
        {{ form.spec }}
        {% if form.spec.errors %}<span class="error">{{ form.spec.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field short">{{ form.base_unit.label }}
        {{ form.base_unit }}
        {% if form.base_unit.errors %}<span class="error">{{ form.base_unit.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field short">{{ form.qty_precision.label }}
        {{ form.qty_precision }}
        {% if form.qty_precision.errors %}<span class="error">{{ form.qty_precision.errors|join:", " }}</span>{% endif %}
      </label>

      <label class="record-field medium">{{ form.min_stock_qty.label }}
        {{ form.min_stock_qty }}
        {% if form.min_stock_qty.errors %}<span class="error">{{ form.min_stock_qty.errors|join:", " }}</span>{% endif %}
      </label>
      {% if form.latest_purchase_price %}
        <label class="record-field medium">{{ form.latest_purchase_price.label }}
          {{ form.latest_purchase_price }}
          {% if form.latest_purchase_price.errors %}<span class="error">{{ form.latest_purchase_price.errors|join:", " }}</span>{% endif %}
        </label>
      {% endif %}

      <label class="record-field full">{{ form.remark.label }}
        {{ form.remark }}
        {% if form.remark.errors %}<span class="error">{{ form.remark.errors|join:", " }}</span>{% endif %}
      </label>
      {% if is_edit %}
        <label class="record-field full" for="operation_reason">修改原因
          <input id="operation_reason" type="text" name="operation_reason" value="">
        </label>
      {% endif %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
      {% if is_edit %}
        <a class="button" href="{% url 'masterdata:material_detail' material.pk %}">返回详情</a>
      {% endif %}
    </div>
  </form>
</section>
{% endblock %}
