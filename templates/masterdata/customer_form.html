{% extends "base.html" %}

{% block content %}
<h1>{{ page_title|default:"新建客户" }}</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'masterdata:customer_list' %}">返回列表</a>
</div>

<section class="panel">
  <h2>客户信息</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    <div class="form-grid">
      {% for field in form %}
        <label class="form-row">{{ field.label }}
          {{ field }}
          {% if field.errors %}<span class="error">{{ field.errors|join:", " }}</span>{% endif %}
        </label>
      {% endfor %}
      {% include "common/operation_reason_field.html" %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
      {% if is_edit %}
        <a class="button" href="{% url 'masterdata:customer_detail' customer.pk %}">返回详情</a>
      {% endif %}
    </div>
  </form>
</section>
{% endblock %}
