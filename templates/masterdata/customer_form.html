{% extends "base.html" %}

{% block content %}
<h1>{{ page_title|default:"新建客户" }}</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'masterdata:customer_list' %}">返回列表</a>
</div>

<section class="panel">
  <h2>客户信息</h2>
  <form class="record-form" method="post">
    {% csrf_token %}
    <div class="record-grid">
      <label class="record-field">{{ form.customer_no.label }}
        {{ form.customer_no }}
        {% if form.customer_no.errors %}<span class="error">{{ form.customer_no.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field name">{{ form.customer_name.label }}
        {{ form.customer_name }}
        {% if form.customer_name.errors %}<span class="error">{{ form.customer_name.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field short">{{ form.status.label }}
        {{ form.status }}
        {% if form.status.errors %}<span class="error">{{ form.status.errors|join:", " }}</span>{% endif %}
      </label>

      <label class="record-field medium">{{ form.short_name.label }}
        {{ form.short_name }}
        {% if form.short_name.errors %}<span class="error">{{ form.short_name.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field medium">{{ form.sales_owner.label }}
        {{ form.sales_owner }}
        {% if form.sales_owner.errors %}<span class="error">{{ form.sales_owner.errors|join:", " }}</span>{% endif %}
      </label>
      <label class="record-field medium">{{ form.settlement_method.label }}
        {{ form.settlement_method }}
        {% if form.settlement_method.errors %}<span class="error">{{ form.settlement_method.errors|join:", " }}</span>{% endif %}
      </label>
      {% if form.contact_phone_encrypted %}
        <label class="record-field medium">{{ form.contact_phone_encrypted.label }}
          {{ form.contact_phone_encrypted }}
          {% if form.contact_phone_encrypted.errors %}<span class="error">{{ form.contact_phone_encrypted.errors|join:", " }}</span>{% endif %}
        </label>
      {% endif %}

      <label class="record-field full">{{ form.remark.label }}
        {{ form.remark }}
        {% if form.remark.errors %}<span class="error">{{ form.remark.errors|join:", " }}</span>{% endif %}
      </label>
      {% if is_edit %}
        <label class="record-field full" for="operation_reason">修改原因
          <input id="operation_reason" type="text" name="operation_reason" value="">
        </label>
      {% endif %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
      {% if is_edit %}
        <a class="button" href="{% url 'masterdata:customer_detail' customer.pk %}">返回详情</a>
      {% endif %}
    </div>
  </form>
</section>
{% endblock %}
