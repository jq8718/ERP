{% extends "base.html" %}

{% block content %}
<h1>编辑组成明细</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'bom:bom_detail' bom.pk %}">返回产品组成清单</a>
</div>

<section class="panel">
  <h2>{{ bom.bom_no }} / {{ bom.bom_version }}</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    <div class="form-grid">
      <label class="form-row">行号
        <input type="text" name="line_no" value="{{ item.line_no }}">
      </label>
      <label class="form-row">原料 / 配件
        <select name="component_material">
          {% for material in component_materials %}
            <option value="{{ material.pk }}" {% if material.pk == item.component_material_id %}selected{% endif %}>
              {{ material }}
            </option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">每基准数量用量
        <input type="text" name="usage_qty" value="{{ item.usage_qty }}">
      </label>
      <label class="form-row">单位
        <input type="text" name="usage_unit" value="{{ item.usage_unit }}">
      </label>
      <label class="form-row">损耗率
        <input type="text" name="loss_rate" value="{{ item.loss_rate }}">
      </label>
      <label class="form-row">
        <span>必需物料</span>
        <input type="checkbox" name="is_required" {% if item.is_required %}checked{% endif %}>
      </label>
      <label class="form-row">备注
        <input type="text" name="remark" value="{{ item.remark }}">
      </label>
      {% include "common/operation_reason_field.html" with is_edit=True %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存组成明细</button>
    </div>
  </form>
</section>
{% endblock %}
