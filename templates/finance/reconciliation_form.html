{% extends "base.html" %}

{% block content %}
<h1>{{ page_title }}</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'finance:reconciliation_list' %}">返回列表</a>
</div>

<section class="panel">
  <h2>对账范围</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    <div class="form-grid">
      <label class="form-row">对象类型
        <select name="party_type">
          <option value="">请选择</option>
          {% for value, label in party_type_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">客户
        <select name="customer">
          <option value="">客户对账时选择</option>
          {% for customer in customers %}
            <option value="{{ customer.pk }}">{{ customer.customer_no }} {{ customer.customer_name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">供应商
        <select name="supplier">
          <option value="">供应商对账时选择</option>
          {% for supplier in suppliers %}
            <option value="{{ supplier.pk }}">{{ supplier.supplier_no }} {{ supplier.supplier_name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">开始日期
        <input type="date" name="period_start" value="{{ today|date:'Y-m-01' }}" data-erp-date="1" placeholder="YYYY-MM-DD" title="请选择日期，或输入 2026-07-04、2026/07/04、2026.07.04、2026年07月04日">
      </label>
      <label class="form-row">结束日期
        <input type="date" name="period_end" value="{{ today|date:'Y-m-d' }}" data-erp-date="1" placeholder="YYYY-MM-DD" title="请选择日期，或输入 2026-07-04、2026/07/04、2026.07.04、2026年07月04日">
      </label>
      <label class="form-row">备注
        <input type="text" name="remark">
      </label>
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">生成对账单</button>
    </div>
  </form>
</section>
{% endblock %}
