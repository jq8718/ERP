{% extends "base.html" %}

{% block content %}
<h1>{{ page_title|default:"新建客户收款" }}</h1>

<div class="form-actions" style="margin-bottom: 16px;">
  <a class="button" href="{% url 'finance:customer_receipt_list' %}">返回列表</a>
</div>

<section class="panel">
  <h2>收款信息</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    <div class="form-grid">
      <label class="form-row">客户
        <select name="customer">
          <option value="">请选择</option>
          {% for customer in customers %}
            <option value="{{ customer.pk }}" {% if receipt.customer_id == customer.pk %}selected{% endif %}>{{ customer.customer_no }} {{ customer.customer_name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">收款日期
        <input type="date" name="receipt_date" value="{% if receipt %}{{ receipt.receipt_date|date:'Y-m-d' }}{% else %}{{ today|date:'Y-m-d' }}{% endif %}" data-erp-date="1" placeholder="YYYY-MM-DD" title="请选择日期，或输入 2026-07-04、2026/07/04、2026.07.04、2026年07月04日">
      </label>
      <label class="form-row">收款金额
        <input type="text" name="receipt_amount" value="{{ receipt.receipt_amount|default:'' }}">
      </label>
      <label class="form-row">收款方式
        <select name="receipt_method">
          {% for value, label in receipt_methods %}
            <option value="{{ value }}" {% if receipt.receipt_method == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="form-row">备注
        <input type="text" name="remark" value="{{ receipt.remark|default:'' }}">
      </label>
      {% include "common/operation_reason_field.html" %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
      {% if is_edit %}
        <a class="button" href="{% url 'finance:customer_receipt_detail' receipt.pk %}">返回详情</a>
      {% endif %}
    </div>
  </form>
</section>
{% endblock %}
