{% extends "base.html" %}

{% block content %}
<h1>修改密码</h1>

<section class="panel" style="max-width: 560px;">
  <form method="post" style="padding: 16px;">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="error">{{ form.non_field_errors }}</div>
    {% endif %}
    <label class="form-row">当前密码
      {{ form.old_password }}
      {% if form.old_password.errors %}<span class="error">{{ form.old_password.errors }}</span>{% endif %}
    </label>
    <label class="form-row">新密码
      {{ form.new_password1 }}
      {% if form.new_password1.errors %}<span class="error">{{ form.new_password1.errors }}</span>{% endif %}
    </label>
    <label class="form-row">确认新密码
      {{ form.new_password2 }}
      {% if form.new_password2.errors %}<span class="error">{{ form.new_password2.errors }}</span>{% endif %}
    </label>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
      <a class="button" href="{% url 'system:dashboard' %}">返回工作台</a>
    </div>
  </form>
</section>
{% endblock %}
