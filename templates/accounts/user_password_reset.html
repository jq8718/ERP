{% extends "base.html" %}

{% block content %}
<h1>{{ page_title }}</h1>

<p class="form-actions">
  <a class="button" href="{% url 'account_user_detail' account_user.pk %}">返回用户详情</a>
</p>

<section class="panel" style="max-width: 560px;">
  <h2>{{ account_user.username }}</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="error">{{ form.non_field_errors }}</div>
    {% endif %}
    {% for field in form %}
      <label class="form-row">{{ field.label }}
        {{ field }}
        {% if field.help_text %}<span class="muted">{{ field.help_text }}</span>{% endif %}
        {% if field.errors %}<span class="error">{{ field.errors|join:", " }}</span>{% endif %}
      </label>
    {% endfor %}
    <div class="form-actions">
      <button class="button primary" type="submit">重置密码并失效会话</button>
    </div>
  </form>
</section>
{% endblock %}
