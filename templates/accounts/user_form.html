{% extends "base.html" %}

{% block content %}
<h1>{{ page_title }}</h1>

<p class="form-actions">
  <a class="button" href="{% if is_edit %}{% url 'account_user_detail' object.pk %}{% else %}{% url 'account_user_list' %}{% endif %}">返回</a>
</p>

<section class="panel">
  <h2>用户信息</h2>
  <form method="post" style="padding: 14px;">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="error">{{ form.non_field_errors }}</div>
    {% endif %}
    <div class="form-grid">
      {% for field in form %}
        <label class="form-row">{{ field.label }}
          {{ field }}
          {% if field.help_text %}<span class="muted">{{ field.help_text }}</span>{% endif %}
          {% if field.errors %}<span class="error">{{ field.errors|join:", " }}</span>{% endif %}
        </label>
      {% endfor %}
    </div>
    <div class="form-actions">
      <button class="button primary" type="submit">保存</button>
    </div>
  </form>
</section>
{% endblock %}
